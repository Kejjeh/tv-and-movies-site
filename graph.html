<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graph · TV &amp; Movies Brain</title>
  <link rel="stylesheet" href="styles.css?v=11">
  <link rel="stylesheet" href="graph.css?v=11">
  <script src="vendor/vis-network-9.1.10.min.js"></script>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#12141c">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body class="graph-page">
  <header>
    <div class="header-row">
      <h1>TV &amp; Movies Brain</h1>
      <nav>
        <a href="index.html">Recommendations</a>
        <a href="graph.html" class="active">Graph</a>
        <a href="insights.html">Insights</a>
        <a href="discovery.html">Discovery</a>
        <a href="confirm.html">Confirm</a>
        <a href="search.html">Search</a>
      </nav>
    </div>
    <p class="subtitle" id="subtitle">Loading&hellip;</p>
  </header>

  <div id="graph-shell">
    <aside id="graph-controls">
      <h2>Edges via</h2>
      <div class="role-chips" id="role-chips">
        <button class="chip active" data-role="creator">creator</button>
        <button class="chip active" data-role="showrunner">showrunner</button>
        <button class="chip active" data-role="writer">writer</button>
        <button class="chip active" data-role="director">director</button>
        <button class="chip active" data-role="producer">producer</button>
        <button class="chip" data-role="actor">actor</button>
      </div>

      <h2>Min shared people: <span id="minppl-val">1</span></h2>
      <input type="range" id="minppl" min="1" max="6" step="1" value="1">

      <h2>Color by</h2>
      <div id="color-mode" class="kind-chips">
        <button class="chip active" data-mode="tone">tone</button>
        <button class="chip" data-mode="cluster">cluster</button>
      </div>

      <h2>Show</h2>
      <div class="kind-chips" id="kind-chips">
        <button class="chip active" data-kind="all">all</button>
        <button class="chip" data-kind="loved">loved only</button>
        <button class="chip" data-kind="tv">tv only</button>
        <button class="chip" data-kind="movie">movies only</button>
      </div>

      <h2>Find</h2>
      <input type="text" id="search" placeholder="title or person name...">
      <div id="search-results"></div>

      <p class="stats" id="stats"></p>
    </aside>

    <section id="network-container">
      <div id="network"></div>
    </section>

    <aside id="details" class="hidden">
      <button id="close-details" aria-label="Close">×</button>
      <h3 id="d-title"></h3>
      <p class="meta" id="d-meta"></p>
      <h4>Tones</h4>
      <p id="d-tones"></p>
      <h4>Genres</h4>
      <p id="d-genres"></p>
      <h4>People</h4>
      <ul id="d-people"></ul>
      <h4>Connected titles</h4>
      <ul id="d-connections"></ul>
    </aside>
  </div>

  <script src="ui.js?v=11"></script>
  <script src="rating-map.js?v=11"></script>
  <script src="taste-profile.js?v=11"></script>
  <script src="graph.js?v=11"></script>
</body>
</html>
