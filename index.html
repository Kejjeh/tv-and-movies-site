<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV &amp; Movies Brain</title>
  <link rel="stylesheet" href="styles.css?v=8">
</head>
<body>
  <header>
    <div class="header-row">
      <h1>TV &amp; Movies Brain</h1>
      <nav>
        <a href="index.html" class="active">Recommendations</a>
        <a href="graph.html">Graph</a>
        <a href="insights.html">Insights</a>
        <a href="discovery.html">Discovery</a>
        <a href="confirm.html">Confirm</a>
        <a href="search.html">Search</a>
      </nav>
      <div id="auth" class="auth"></div>
    </div>
    <p class="subtitle" id="subtitle">Loading data&hellip;</p>
  </header>
  <main>
    <aside id="controls">
      <h2>Lane</h2>
      <div id="lane-chips"></div>

      <h2>Mood</h2>
      <div id="mood-chips"></div>

      <h2>Themes <span class="hint" id="theme-toggle">show all</span></h2>
      <div id="theme-chips"></div>

      <h2>Narratives</h2>
      <div id="narrative-chips"></div>

      <h2>Min IMDb rating: <span id="rating-val">7.5</span></h2>
      <input type="range" id="rating" min="0" max="10" step="0.1" value="7.5">

      <h2>Mode</h2>
      <div id="mode-chips"></div>

      <h2>Top N: <span id="topn-val">10</span></h2>
      <input type="range" id="topn" min="1" max="25" step="1" value="10">

      <h2>Kind</h2>
      <div id="kind-chips">
        <button class="chip active" data-kind="all">all</button>
        <button class="chip" data-kind="tv">tv</button>
        <button class="chip" data-kind="movie">movie</button>
      </div>

      <p class="updated" id="updated"></p>
    </aside>
    <div class="results-col">
      <section id="continue" hidden></section>
      <section id="results"></section>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js?v=8"></script>
  <script src="status-store.js?v=8"></script>
  <script src="ui.js?v=8"></script>
  <script src="rating-map.js?v=8"></script>
  <script src="taste-profile.js?v=8"></script>
  <script src="scorer.js?v=8"></script>
  <script src="app.js?v=8"></script>
</body>
</html>
